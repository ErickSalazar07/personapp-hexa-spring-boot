# Logging config
logging.level.root=INFO
logging.file.name=logs/persona.log

# REST Config
server.port=3000
spring.application.name=PersonApp API

# Bean reference Config
spring.main.allow-circular-references=true

# SWAGGER (OpenAPI) Config
springdoc.api-docs.path=/api-docs

# MariaDB Config
spring.datasource.url=jdbc:mariadb://${MARIADB_HOST:localhost}:${MARIADB_PORT:3307}/${MARIADB_DB:persona_db}
spring.datasource.username=${MARIADB_USER:persona_db}
spring.datasource.password=${MARIADB_PASSWORD:persona_db}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# MongoDB Config
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=${MONGO_DB:persona_db}
spring.data.mongodb.username=${MONGO_USER:persona_db}
spring.data.mongodb.password=${MONGO_PASSWORD:persona_db}
spring.data.mongodb.authentication-database=${MONGO_AUTH_DB:admin}