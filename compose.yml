services:
  rest:
    build:
      context: .
      dockerfile: Dockerfile.rest
    container_name: personapp-rest
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_USER: persona_db
      MARIADB_PASSWORD: persona_db
      MARIADB_DB: persona_db
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: persona_db
      MONGO_PASSWORD: persona_db
      MONGO_DB: persona_db
      MONGO_AUTH_DB: admin
      SERVER_PORT: 3000

  mariadb:
    image: mariadb:10.11
    container_name: personapp-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: persona_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/persona_ddl_maria.sql:/docker-entrypoint-initdb.d/01_ddl.sql
      - ./scripts/persona_dml_maria.sql:/docker-entrypoint-initdb.d/02_dml.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:6.0
    container_name: personapp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: persona_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/01_init.js
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "root", "-p", "root", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mariadb_data:
  mongo_data:
